<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Tabela com Iframes</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;   /* impede rolagem */
            height: 100%;
        }
        table {
            border: 0px solid #3D3938;
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        td {
            border: 1px solid black;
            padding: 0;
            height: calc((100vw / 43) * 1.136942675159236);

        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>

    <script>
        function verificarHorario() {
            const agora = new Date();
            const segundo = agora.getSeconds();

            if (segundo === 38) {
                location.reload();
            }
        }

        // verifica a cada 1 segundo
        setInterval(verificarHorario, 1000);
    </script>

</head>
