<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tabela com Iframes</title>
    <style>
        table {
            width: 100%;
            height: 100vh;
            border-collapse: collapse;
        }
        td {
            border: 1px solid #000;
            padding: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>

    <script>
    setInterval(() => {
        location.reload();
    }, 10000); // 10.000 ms = 10 segundos
    </script>

</head>
<body>

<table>
    <tr>
        <td><iframe src="L1C1.html"></iframe></td>
        <td><iframe src="L1C2.html"></iframe></td>
        <td><iframe src="L1C3.html"></iframe></td>
        <td><iframe src="L1C4.html"></iframe></td>
    </tr>
    <tr>
        <td><iframe src="L2C1.html"></iframe></td>
        <td><iframe src="L2C2.html"></iframe></td>
        <td><iframe src="L2C3.html"></iframe></td>
        <td><iframe src="L2C4.html"></iframe></td>
    </tr>
    <tr>
        <td><iframe src="L3C1.html"></iframe></td>
        <td><iframe src="L3C2.html"></iframe></td>
        <td><iframe src="L3C3.html"></iframe></td>
        <td><iframe src="L3C4.html"></iframe></td>
    </tr>
</table>

</body>
</html>
